name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── 1. ECSoC26 Label Check ──────────────────────────────────────────────────
  label-check:
    name: PR — ECSoC26 Label Required
    runs-on: ubuntu-latest
    # Skip this check for Dependabot — it can't add labels automatically
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - name: Check for ECSoC26 label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('ECSoC26')) {
              core.setFailed(
                '❌ This PR is missing the ECSoC26 label.\n' +
                'Add the label so your contribution gets scored by ECSoC Sentinel.'
              );
            } else {
              console.log('✅ ECSoC26 label found.');
            }

  # ── 2. Backend — Lint & Type Check ─────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check backend/

      - name: Type check with mypy (entry points only)
        # We only check the public surface (main.py, auth.py, routes/)
        # bot.py and admin.py are excluded — they rely on untyped telegram internals.
        run: |
          mypy backend/main.py backend/auth.py backend/diff_service.py \
            --ignore-missing-imports \
            --allow-untyped-defs \
            --allow-incomplete-defs \
            --no-error-summary

  # ── 3. Extension — TypeScript Check ────────────────────────────────────────
  extension-lint:
    name: Extension — TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: |
          cd extension
          npm ci

      - name: TypeScript compile check
        run: |
          cd extension
          npx tsc --noEmit

  # ── 4. Security — Secret Scan ───────────────────────────────────────────────
  security-scan:
    name: Security — Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}