# Dependabot configuration
# Automatically opens PRs to keep dependencies up to date.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:

  # ── Python (backend) ───────────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    labels:
      - "dependencies"
      - "backend"
    open-pull-requests-limit: 2  # 1 for the group + 1 buffer for any major update
    # Group all non-major updates into a single PR to reduce noise
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ── Node.js (VS Code extension) ────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/extension"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    labels:
      - "dependencies"
      - "extension"
    open-pull-requests-limit: 2  # 1 for the group + 1 buffer for any major update
    groups:
      extension-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
